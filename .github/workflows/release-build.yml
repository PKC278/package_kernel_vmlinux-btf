name: Build Packages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [pkg]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}-latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_generic

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get OpenWrt latest release
        run: |
          release_json="$(curl -fsSL https://api.github.com/repos/openwrt/openwrt/releases/latest)"
          OPENWRT_RELEASE_TAG="$(jq -r '.tag_name' <<< "$release_json")"
          OPENWRT_SOURCE_URL="$(jq -r '.tarball_url' <<< "$release_json")"

          if [ -z "$OPENWRT_RELEASE_TAG" ] || [ "$OPENWRT_RELEASE_TAG" = "null" ]; then
            echo "Failed to get latest OpenWrt release tag" >&2
            exit 1
          fi

          if [ -z "$OPENWRT_SOURCE_URL" ] || [ "$OPENWRT_SOURCE_URL" = "null" ]; then
            echo "Failed to get latest OpenWrt release source URL" >&2
            exit 1
          fi

          OPENWRT_VERSION="${OPENWRT_RELEASE_TAG#v}"
          echo "OPENWRT_RELEASE_TAG=$OPENWRT_RELEASE_TAG" >> "$GITHUB_ENV"
          echo "OPENWRT_VERSION=$OPENWRT_VERSION" >> "$GITHUB_ENV"
          echo "OPENWRT_SERIES=${OPENWRT_VERSION%.*}" >> "$GITHUB_ENV"
          echo "OPENWRT_SOURCE_URL=$OPENWRT_SOURCE_URL" >> "$GITHUB_ENV"

      - name: Compute ARCH / effective arch
        run: |
          echo "SKIP_BUILD=0" >> "$GITHUB_ENV"
          if [ "$OPENWRT_SERIES" = "25.12" ] && [ "${{ matrix.arch }}" = "riscv64_riscv64" ]; then
            echo "EFFECTIVE_ARCH=riscv64_generic" >> "$GITHUB_ENV"
            echo "ARCH=riscv64_generic-$OPENWRT_VERSION" >> "$GITHUB_ENV"
          elif [ "$OPENWRT_SERIES" = "25.12" ] && [ "${{ matrix.arch }}" = "mips_4kec" ]; then
            echo "SKIP_BUILD=1" >> "$GITHUB_ENV"
          else
            echo "EFFECTIVE_ARCH=${{ matrix.arch }}" >> "$GITHUB_ENV"
            echo "ARCH=${{ matrix.arch }}-$OPENWRT_VERSION" >> "$GITHUB_ENV"
          fi

      - name: Build Packages
        if: ${{ env.SKIP_BUILD == '0' }}
        uses: sbwml/openwrt-gh-action-sdk@helloworld
        env:
          CONTAINER: ghcr.io/openwrt/sdk
          FEEDNAME: packages_ci
          PACKAGES: vmlinux-btf
          NO_REFRESH_CHECK: true
          V: s

      - name: Upload artifacts
        if: ${{ env.SKIP_BUILD == '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCH }}
          path: |
            bin/packages/${{ env.EFFECTIVE_ARCH }}/packages_ci/*.apk
            bin/packages/${{ env.EFFECTIVE_ARCH }}/packages_ci/*.ipk

      - name: Create compress files
        if: ${{ env.SKIP_BUILD == '0' }}
        continue-on-error: true
        run: |
          tar -zcvf ${{ env.ARCH }}.tar.gz -C bin/packages/${{ env.EFFECTIVE_ARCH }}/ packages_ci
          echo "latest_release=$(TZ='Asia/Shanghai' date +%Y-%m-%d)" >>$GITHUB_ENV

      - name: Create release
        if: ${{ env.SKIP_BUILD == '0' }}
        uses: ncipollo/release-action@v1
        with:
          name: OpenWrt ${{ env.OPENWRT_VERSION }}
          body: |
            Built against the official OpenWrt release ${{ env.OPENWRT_RELEASE_TAG }}.
            Source: ${{ env.OPENWRT_SOURCE_URL }}
          allowUpdates: true
          tag: openwrt-${{ env.OPENWRT_VERSION }}
          commit: main
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "${{ env.ARCH }}.tar.gz"
